services:
  db:
    image: postgres:16-alpine
    container_name: asambleas_db
    environment:
      POSTGRES_DB: asambleas_edu_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: asambleas_api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=asambleas_edu_db;Username=postgres;Password=postgres
    ports:
      - "5263:5263"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
