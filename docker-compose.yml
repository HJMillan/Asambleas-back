services:
  db:
    image: postgres:16-alpine
    container_name: asambleas_db
    environment:
      POSTGRES_DB: asambleas_edu_db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: asambleas_api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      # Secrets via env vars — en producción usar Docker Secrets o un vault
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=asambleas_edu_db;Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      - JwtSettings__Secret=${JWT_SECRET:-AsambleasEdu-SuperSecret-Key-2024-MustBe-AtLeast-32-Characters-Long!}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
